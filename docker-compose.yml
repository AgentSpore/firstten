{"path":"docker-compose.yml","branch":"main","content":"version: '3.8'\n\nservices:\n  db:\n    image: postgres:15\n    environment:\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: postgres\n      POSTGRES_DB: postgres\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n    ports:\n      - \"5432:5432\"\n\n  app:\n    build: .\n    depends_on:\n      - db\n    environment:\n      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres\n      CORS_ORIGINS: \"*\"\n      LOG_LEVEL: INFO\n    ports:\n      - \"8000:8000\"\n    volumes:\n      - .:/app\n      - /app/__pycache__\n      - /app/.pyc\n\nvolumes:\n  pgdata:"}